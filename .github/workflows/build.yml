name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─── Step 1: bump version, tag, create release ───────────────────────
  version:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Bump patch version and tag
        id: bump
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Split and increment patch
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "New version: $NEW_VERSION"

          # Write new version into package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Commit the version bump back to main
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main

          # Tag the new commit
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG"         >> $GITHUB_OUTPUT

  # ─── Step 2: build macOS ─────────────────────────────────────────────
  build-mac:
    name: Build macOS (arm64 + x64)
    needs: version
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Package macOS (arm64 then x64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-builder --mac --arm64 --publish always
          npx electron-builder --mac --x64 --publish always

  # ─── Step 3: build Windows ───────────────────────────────────────────
  build-win:
    name: Build Windows (x64)
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Package Windows x64
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
